<div class="compare-body">
  <h1 class="text-3xl font-semibold mb-4">Сравнение</h1>

<div *ngIf="loading" class="text-center p-4">
  Загрузка...
</div>

<div *ngIf="error" class="text-red-500 text-center p-4">
  Ошибка загрузки данных
</div>

<div class="body" *ngIf="!loading && !error && !noProjects && inited">
  <p>Выберите проекты, на основе которых будет производиться сравнение (2-3)</p>
  <project-checkbox (onChecked)="onProjectToggle(project, $event.Checked)"
                    *ngFor="let project of projects" [project]= "project">

  </project-checkbox>
  <button
    class="bg-blue-500 text-white px-4 py-2 rounded disabled:opacity-50"
    [disabled]="selectedProjects.length < 2"
    (click)="compare()"
  >
    Сравнить
  </button>
</div>
  <div class="body_empty" *ngIf="!loading && !error && noProjects && inited">
    <p>Вы не выбрали ни одного проекта для аналитики</p>
    <div class="icon">
      <a href="http://{{webUrl}}/">
        <img src="/assets/images/HSE_logo.png" alt="HSE">
      </a>
    </div>
  </div>
</div>
